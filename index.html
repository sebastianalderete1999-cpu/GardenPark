<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Garden Park</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- Brand -->
  <div class="brand">
    <img src="logo.png" class="logo" alt="Hotel Garden Park">
  </div> <!-- ✅ CIERRE AGREGADO -->

  <!-- Hero panel -->
  <div class="hero-panel">
    <h1 class="hero-title">
      Bienvenidos<br>
      <strong>a nuestro hotel</strong>
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-subtitle">
      SERVICIOS DE <strong>EXCELENCIA</strong><br>
      A SU DISPOSICIÓN
    </p>
  </div>

  <!-- Services -->
  <p class="section-label">Nuestros Servicios</p>

  <div class="grid">

    <a href="bar.html" class="card">
      <span class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 3h14l-5 8H10L5 3z"/>
          <line x1="12" y1="11" x2="12" y2="20"/>
          <line x1="8.5" y1="20" x2="15.5" y2="20"/>
          <circle cx="17" cy="6" r="1.5"/>
        </svg>
      </span>
      <p>Bar</p>
    </a>

    <a href="cochera.html" class="card">
      <span class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 11.5L7 6h10l2 5.5"/>
          <rect x="3" y="11.5" width="18" height="5.5" rx="1"/>
          <circle cx="7.5" cy="17" r="1.5"/>
          <circle cx="16.5" cy="17" r="1.5"/>
          <line x1="3" y1="14" x2="21" y2="14"/>
        </svg>
      </span>
      <p>Cochera</p>
    </a>

    <a href="lavanderia.html" class="card">
      <span class="card-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="17" rx="1"/>
          <path d="M3 9h18"/>
          <circle cx="12" cy="15" r="4"/>
          <circle cx="12" cy="15" r="1.5"/>
          <circle cx="6.5" cy="6.5" r="0.8" fill="currentColor"/>
          <circle cx="9" cy="6.5" r="0.8" fill="currentColor"/>
        </svg>
      </span>
      <p>Lavandería</p>
    </a>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
